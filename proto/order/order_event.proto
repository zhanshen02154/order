syntax = "proto3";

package order.event;

option go_package = "./internal/domain/event/order";

// 订单支付成功事件
message OnPaymentSuccess {
  int64 OrderId = 1;
  repeated OrderDetail OrderDetails = 2;
}

// 订单-商品Sku
message OrderDetail {
  int64 product_id = 1;
  int64 sku_id = 2;
  uint32 quantity = 3;
}